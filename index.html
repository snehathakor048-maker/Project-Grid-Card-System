<!DOCTYPE html>
<html lang="en">

<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Frontend Journey</title>

<link rel="stylesheet" href="style.css">
<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

</head>

<body>

<header>
<nav class="navbar">

<div class="nav-left">
<h2>Sneha</h2>
</div>

<ul class="nav-center" id="navMenu">
<li><a href="#" class="active">Home</a></li>
<li><a href="#">Projects</a></li>
<li><a href="#">Contact</a></li>
</ul>

<div class="nav-right">
<button class="btn btn-primary">Hire Me</button>
<div class="hamburger" id="hamburger">
<i class="fa fa-bars"></i>
</div>
</div>

</nav>
</header>

<!-- HERO SEARCH -->
<section class="hero">

<h1>Search Your Projects</h1>

<form id="searchForm">
<input type="text" id="searchInput" placeholder="Search project">
<button type="submit" class="btn btn-primary">
<i class="fa fa-search"></i>
</button>
</form>

</section>

<!-- PROJECT GRID -->
<section class="projects">

<h2>My Projects</h2>

<div class="project-grid">

<div class="card">
<img src="https://picsum.photos/300/200">
<h3>Portfolio</h3>
<p>Personal portfolio website.</p>
<button class="btn btn-outline">View Project</button>
</div>

<div class="card">
<img src="https://picsum.photos/301/200">
<h3>Ecommerce</h3>
<p>Responsive ecommerce UI layout.</p>
<button class="btn btn-outline">View Project</button>
</div>

<div class="card">
<img src="https://picsum.photos/302/200">
<h3>Dashboard</h3>
<p>Admin dashboard with charts.</p>
<button class="btn btn-outline">View Project</button>
</div>

</div>

</section>

<!-- DAY 8 CONTACT FORM -->
<section class="contact-section">

<h2>Contact Me</h2>

<form id="contactForm">

<div class="form-group">
<label for="name">Name:</label>
<input type="text" id="name">
<span class="error-msg" id="nameError"></span>
</div>

<div class="form-group">
<label for="email">Email:</label>
<input type="email" id="email">
<span class="error-msg" id="emailError"></span>
</div>

<div class="form-group">
<label for="message">Message:</label>
<textarea id="message"></textarea>
<span class="error-msg" id="msgError"></span>
</div>

<button class="btn btn-primary" id="submitBtn" disabled>
Send Message
</button>

</form>

</section>

<footer>
<p>© 2026 Sneha Thakor</p>
</footer>

<script src="script.js"></script>

</body>
</html>
