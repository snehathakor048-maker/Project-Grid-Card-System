<!DOCTYPE html>
<html lang="en">

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

</div>

<ul class="nav-center" id="navMenu">

</div>
</div>
</nav>

<!-- HERO -->
<section class="hero">
<h1>Search Your Projects</h1>
<form class="search-form" id="searchForm">

<div class="search-box">
<input type="text" id="searchInput" placeholder="Enter project name..." required>
<button type="submit" class="btn btn-primary">

</button>
</div>
</form>
</section>

<!-- DAY 6 PROJECT GRID -->
<section class="projects">
<h2>My Projects</h2>
<div class="project-grid">
<div class="project-card">
<img src="https://picsum.photos/300/200" alt="">
<h3>Portfolio Website</h3>
<p>Simple portfolio project.</p>
<button class="btn btn-outline">View Project</button>
</div>

<div class="project-card">
<img src="https://picsum.photos/301/200" alt="">
<h3>Ecommerce UI</h3>
<p>Responsive ecommerce layout with cards.</p>
<button class="btn btn-outline">View Project</button>
</div>

<div class="project-card">
<img src="https://picsum.photos/302/200" alt="">

<p>Dashboard UI built using CSS Grid.</p>
<button class="btn btn-outline">View Project</button>
</div>
</div>
</section>

<!-- DAY 7 NOTIFICATION PLAYGROUND -->
<section class="card">
<h2>Notification Playground</h2>
<button class="btn btn-primary" id="successBtn">Trigger Success</button>
<button class="btn btn-outline" id="errorBtn">Trigger Error</button>
</section>

<footer>

</footer>

<div class="toast-container" id="toastContainer"></div>
